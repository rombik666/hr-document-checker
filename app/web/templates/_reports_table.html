{% if reports %}
<table>
    <thead>
        <tr>
            <th>Файл</th>
            <th>Статус</th>
            <th>Дата</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
    {% for item in reports %}
        <tr>
            <td>{{ item.filename }}</td>
            <td>{{ item.summary_status }}</td>
            <td>{{ item.created_at }}</td>
            <td>
                <a href="/api/v1/documents/reports/{{ item.id }}">JSON</a>
                |
                <a href="/api/v1/documents/reports/{{ item.id }}/export/docx">DOCX</a>
            </td>
        </tr>
    {% endfor %}
    </tbody>
</table>
{% else %}
<p class="muted">Сохранённых отчётов пока нет.</p>
{% endif %}
