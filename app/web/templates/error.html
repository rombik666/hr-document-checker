<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Ошибка проверки</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #1f2937;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: #ffffff;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .error {
            background: #fef2f2;
            border-left: 5px solid #dc2626;
            padding: 16px;
            border-radius: 10px;
            color: #7f1d1d;
        }

        a {
            color: #2563eb;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Ошибка проверки</h1>

    <div class="error">
        {{ error_message }}
    </div>

    <p>
        <a href="/web/">Вернуться к загрузке документа</a>
    </p>
</div>
</body>
</html>
