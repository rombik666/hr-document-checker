services:
  postgres:
    image: postgres:16
    container_name: hr_doc_checker_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hr_doc_checker
      POSTGRES_USER: hr_user
      POSTGRES_PASSWORD: hr_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hr_user -d hr_doc_checker"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hr_doc_checker_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PROJECT_NAME: "HR Document Checker"
      APP_ENV: "docker"
      DEBUG: "true"
      DATABASE_URL: "postgresql+psycopg://hr_user:hr_password@postgres:5432/hr_doc_checker"
      LOG_DIR: "/app/logs"
      LOG_FILE: "app.log"
      RAG_RETRIEVER_TYPE: "faiss"
      RAG_EMBEDDING_BACKEND: "sentence_transformer"
      RAG_EMBEDDING_MODEL_NAME: "sentence-transformers/all-MiniLM-L6-v2"
      RAG_EMBEDDING_DIMENSION: "384"
      RAG_INDEX_DIR: "/app/data/index"
      RAG_ALLOW_EMBEDDING_FALLBACK: "true"
      HF_HOME: "/app/data/hf_cache"
      LLM_PROVIDER: "ollama"
      LLM_BASE_URL: "http://host.docker.internal:11434"
      LLM_MODEL: "qwen2.5:7b"
      LLM_API_KEY: ""
      LLM_TIMEOUT_SECONDS: "60"
      LLM_ENABLED: "true"
      LLM_SEMANTIC_AGENT_ENABLED: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - ./logs:/app/logs

  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: hr_doc_checker_pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: hr_doc_checker_prometheus
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.3.0
    container_name: hr_doc_checker_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  pgadmin_data: